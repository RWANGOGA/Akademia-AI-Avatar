<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My AI Avatar</title>
    <style>
      body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: Arial, sans-serif; }
      
      #canvas-container { width: 100vw; height: 100vh; display: block; }
      canvas { display: block; }
      
      /* 2D Face Container with Aura and Badge */
      #face-container {
        display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 400px; height: 400px; border-radius: 50%;
        overflow: visible; /* Allows the aura to show outside the circle */
        border: 8px solid #007bff; background-color: #333;
      }
      #face-aura {
        position: absolute; top: -30px; left: -30px; right: -30px; bottom: -30px;
        border-radius: 50%; background: rgba(0, 123, 255, 0.4);
        filter: blur(25px); z-index: -1; transition: background 0.5s ease;
      }
      #uploaded-face {
        width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
        transform-origin: center top; /* Anchors the top of the head so the jaw can drop */
        transition: transform 0.05s linear;
      }
      #mode-badge {
        position: absolute; top: 10px; right: 10px; font-size: 40px;
        background: white; border-radius: 50%; width: 70px; height: 70px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 10;
        transition: all 0.3s ease;
      }

      #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #333; z-index: 100; }

      #responseArea {
        background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 10px; 
        display: none; max-height: 150px; overflow-y: auto; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px;
      }
      #textEn { margin: 0 0 10px 0; font-weight: bold; color: #333; }
      #textJa { margin: 0; color: #d32f2f; font-size: 1.1em; font-weight: 500; }

      .controls-bar {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
        display: flex; flex-direction: column; z-index: 10; width: 90%; max-width: 700px;
      }
      .input-row { display: flex; gap: 10px; align-items: center; }
      
      input[type="text"], select { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
      input[type="text"] { flex: 1; }
      
      button { padding: 12px 16px; font-size: 16px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
      #uploadBtn { background-color: #6f42c1; }
      #speakBtn { background-color: #007bff; padding: 12px 24px; }
      
      .mode-toggle {
        position: absolute; top: 20px; right: 20px; z-index: 100;
        background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        display: flex; gap: 10px; align-items: center; font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading 3D Avatar...</div>
    <div id="canvas-container"></div>

    <!-- 2D Face with Aura and Badge -->
    <div id="face-container">
      <div id="face-aura"></div>
      <img id="uploaded-face" src="" alt="User Face">
      <div id="mode-badge">💼</div>
    </div>

    <div class="mode-toggle">
      <span>Mode:</span>
      <button id="mode3dBtn" style="background-color: #007bff;">3D Avatar</button>
      <button id="mode2dBtn" style="background-color: #6c757d;">2D Photo</button>
    </div>

    <div class="controls-bar">
      <div id="responseArea">
        <p id="textEn"></p>
        <p id="textJa"></p>
      </div>
      
      <div class="input-row">
        <select id="personaSelect" title="Persona" aria-label="Persona">
          <option value="Tutor">👨‍ Friendly Tutor</option>
          <option value="Business">💼 Business Guide</option>
          <option value="Casual">😎 Casual Friend</option>
        </select>

        <input type="text" id="userInput" placeholder="Type or upload audio...">
        
        <input type="file" id="audioFile" accept="audio/*" style="display: none;">
        <button id="uploadBtn" onclick="document.getElementById('audioFile').click()">📁</button>

        <input type="file" id="imageFile" accept="image/*" style="display: none;">
        <button id="imageUploadBtn" onclick="document.getElementById('imageFile').click()" style="background-color: #fd7e14;">🖼️</button>

        <button id="speakBtn">Ask & Speak</button>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
